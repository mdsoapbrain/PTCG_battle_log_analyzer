services:
  - type: web
    name: ptcg-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: API_PREFIX
        value: ""
      - key: API_BASE_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./backend.db
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_MODE
        value: stub
