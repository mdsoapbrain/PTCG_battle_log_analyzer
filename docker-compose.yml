version: '3.9'
services:
  backend:
    build: .
    container_name: ptcg-backend
    ports:
      - "${APP_PORT:-8001}:${APP_PORT:-8001}"
    env_file:
      - .env
    volumes:
      - ./:/app
    command: sh -c "uvicorn backend.main:app --host ${APP_HOST:-0.0.0.0} --port ${APP_PORT:-8001} --reload"
